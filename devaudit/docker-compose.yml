version: '3.8'

services:
    app:
        build:
            context: ..
            dockerfile: Dockerfile
        image: svelte-vel-app
        container_name: svelte-vel-app
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - ../:/var/www/html
            - ./logs:/var/log
            - ./supervisord.conf:/etc/supervisord.conf
        networks:
            - svelte-vel-network
        depends_on:
            - mysql
            - redis
        environment:
            APP_ENV: production
            APP_DEBUG: false
            APP_KEY: ${APP_KEY}
            APP_URL: ${APP_URL}
            DB_CONNECTION: mysql
            DB_HOST: mysql
            DB_PORT: 3306
            DB_DATABASE: ${DB_DATABASE}
            DB_USERNAME: ${DB_USERNAME}
            DB_PASSWORD: ${DB_PASSWORD}
            REDIS_HOST: redis
            REDIS_PASSWORD: ${REDIS_PASSWORD}
            REDIS_PORT: 6379
            BROADCAST_DRIVER: log
            CACHE_DRIVER: redis
            QUEUE_CONNECTION: redis
            SESSION_DRIVER: redis
            SESSION_LIFETIME: 120

    nginx:
        image: nginx:alpine
        container_name: svelte-vel-nginx
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ../:/var/www/html
            - ./nginx/conf.d:/etc/nginx/conf.d
            - ./logs/nginx:/var/log/nginx
        networks:
            - svelte-vel-network
        depends_on:
            - app

    mysql:
        image: mysql:8.0
        container_name: svelte-vel-mysql
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_USER: ${DB_USERNAME}
        volumes:
            - ./mysql:/var/lib/mysql
            - ./logs/mysql:/var/log/mysql
        networks:
            - svelte-vel-network
        ports:
            - "3306:3306"

    redis:
        image: redis:alpine
        container_name: svelte-vel-redis
        restart: unless-stopped
        command: redis-server --requirepass ${REDIS_PASSWORD}
        volumes:
            - ./redis:/data
            - ./logs/redis:/var/log/redis
        networks:
            - svelte-vel-network
        ports:
            - "6379:6379"

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        container_name: svelte-vel-phpmyadmin
        restart: unless-stopped
        environment:
            PMA_HOST: mysql
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
        ports:
            - "8080:80"
        networks:
            - svelte-vel-network
        depends_on:
            - mysql

networks:
    svelte-vel-network:
        driver: bridge
